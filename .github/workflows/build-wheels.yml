name: build-wheels
description: Build Slicer Core and Slicer Core SDK

on:
  workflow_call:
    inputs:
      os:
        description: 'The operating system to run the job on'
        required: true
        type: string
      vtk-tag:
        description: 'VTK version to use, must match the one in pyproject.toml'
        required: true
        type: string
      python-version:
        description: 'Python version to set up (e.g., 3.10)'
        required: true
        type: string
      build-target:
        description: 'CIBW build target (e.g., cp310-manylinux_x86_64)'
        required: true
        type: string
      wheel-tag:
        description: 'Wheel tag to apply after building. Ignored on Windows.'
        required: true
        type: string
      macosx-deployment-target:
        description: 'Used to set the MACOSX_DEPLOYMENT_TARGET env variable. Only used on Mac.'
        required: false
        default: "11.0"
        type: string
      use-cache:
        description: 'Enable or disable ccache restoration and saving'
        type: boolean
        default: true
        required: false

jobs:
  test:
    runs-on: ${{ inputs.os }}
    
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ inputs.macosx-deployment-target }}
      CIBW_BUILD: ${{ inputs.build-target }}
      # cibuildwheel creates a docker container for building our wheel
      # This is all the required steps to use host ccache correctly
      # Note that this is only needed on linux, as Mac and Windows do not use docker containers
      CIBW_CONTAINER_ENGINE: "docker; create_args: --volume /home/runner/.cache/ccache:/host/.cache/ccache --volume /home/runner/.config/ccache:/host/.config/ccache"
      # Install a compiler cache on each platform
      CIBW_BEFORE_ALL_LINUX: "yum install -y ccache && ccache --show-config && ccache -z"
      CIBW_BEFORE_ALL_MACOS: "ccache --show-config && ccache -z"
      CIBW_BEFORE_ALL_WINDOWS: "ccache --show-config && ccache -z"
      # Use no build isolation so ccache can hit correctly since vtk-sdk will always be in the same logical directory
      CIBW_BUILD_FRONTEND: "pip; args: --no-build-isolation"
      # And as we use --no-build-isolation, let's install the dependencies manually
      CIBW_BEFORE_BUILD: "pip install scikit-build-core vtk-sdk-python-wheel-helper
        vtk-sdk==${{ inputs.vtk-tag }}
        --extra-index-url https://vtk.org/files/wheel-sdks
        vtk==${{ inputs.vtk-tag }}
        --extra-index-url https://wheels.vtk.org"
      # Do not repair, everything is already put just as needed to make it work
      # SlicerCore uses extensive CMake logic to package everything as needed, do not try this at home!
      CIBW_REPAIR_WHEEL_COMMAND_LINUX: "
        python -m pip install wheel &&
        python -m wheel tags --platform-tag ${{ inputs.wheel-tag }} --remove {wheel} &&
        cp $(dirname {wheel})/slicer_core*.whl {dest_dir}"
      CIBW_REPAIR_WHEEL_COMMAND_MACOS: "
        python -m pip install wheel &&
        python -m wheel tags --platform-tag ${{ inputs.wheel-tag }} --remove {wheel} &&
        cp $(dirname {wheel})/slicer_core*.whl {dest_dir}"

    steps:
    # Install and setup ccache on host
    - name: Install ccache (Linux)
      if: runner.os == 'Linux' && inputs.use-cache
      run: sudo apt-get update && sudo apt-get install -y ccache
    - name: Install ccache (macOS)
      if: runner.os == 'macOS' && inputs.use-cache
      run: brew install ccache

    - name: Restore ccache
      if: inputs.use-cache
      uses: actions/cache/restore@v4
      with:
        path: |
          ~/.cache/ccache
          ~/Library/Caches/ccache
          C:\Users\runneradmin\AppData\Local\ccache
        key: ccache-${{ inputs.os }}-${{ github.run_id }}
        restore-keys: |
          ccache-${{ inputs.os }}-

    - name: ccache config
      if: runner.os != 'Linux' && inputs.use-cache
      run: |
        ccache --set-config=max_size=256Mi && ccache --set-config=compression=true
        echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV
        echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

    - name: ccache config (Linux)
      if: runner.os == 'Linux' && inputs.use-cache
      run: echo "CIBW_ENVIRONMENT=CCACHE_DIR=/host/.cache/ccache \
        CCACHE_CONFIGPATH=/host/.config/ccache/ccache.conf \
        CMAKE_C_COMPILER_LAUNCHER=ccache \
        CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

    # Build and test wheels
    - uses: actions/checkout@v4

    # Use MSVC with Ninja on Windows
    - uses: ilammy/msvc-dev-cmd@v1.13.0

    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
        cache-dependency-path: 'pyproject.toml'

    - name: Apply patch
      run: python apply_patch.py && python set_vtk_version.py ${{ inputs.vtk-tag }}

    - name: Build wheel
      uses: pypa/cibuildwheel@v3.3.1
      with:
        package-dir: Slicer
        output-dir: wheelhouse

    - name: ccache stats (after Runtime build)
      if: ${{ inputs.use-cache }}
      run: ccache -s -v

    - name: Upload wheel
      uses: actions/upload-artifact@v4
      with:
        name: slicer-core-${{ inputs.python-version }}-${{ inputs.build-target }}
        path: wheelhouse/slicer_core-*.whl

    - name: Build wheel SDK
      uses: pypa/cibuildwheel@v3.3.1
      with:
        package-dir: Slicer/SlicerCoreSDK
        output-dir: wheelhouse

    - name: ccache stats (after SDK build)
      if: ${{ inputs.use-cache }}
      run: ccache -s -v

    - name: Upload wheel SDK
      uses: actions/upload-artifact@v4
      with:
        name: slicer-core-sdk-${{ inputs.python-version }}-${{ inputs.build-target }}
        path: wheelhouse/slicer_core_sdk-*.whl

    - name: Setup tests (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get install mesa-common-dev mesa-utils freeglut3-dev

    - name: Test
      run: |
        python -m pip install virtualenv pytest
        python -m pytest --local-wheels=wheelhouse --verbose Slicer/SlicerCoreSDK

    # - name: Upload to PyPi if enabled

    - name: Save ccache
      uses: actions/cache/save@v4
      # We want the cache to be updated regardless of success, but ONLY if caching is enabled
      if: ${{ always() && inputs.use-cache }}
      with:
        path: |
          ~/.cache/ccache
          ~/Library/Caches/ccache
          C:\Users\runneradmin\AppData\Local\ccache
        key: ccache-${{ inputs.os }}-${{ github.run_id }}